<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="css/common.css" />
    <title>로그인 | ROUNZ</title>
  </head>
  <body>
    <main>
      <section class="wrap login-cantainer">
        <!-- 로그인 창 헤더-->
         <div>
            <p>세상에 없던 안경 쇼핑</p>
            <h1 class="logo">rounz</h1>
         </div>

         <div class="input-field">

          <form action="" class="email-field">
            <label for="useremail"></label>
            <input type="email" id="useremail" required placeholder="Email address*">
          </form>

          <form action="" class="password-field">
            <label for="userpw">
              <span>visibility</span>
            </label>
            <input type="password" id="userpw" required placeholder="Password*" minlength="8" maxlength="16">
          </form>

          <button>continue</button> <!-- 컴포넌트로 대체 예정-->
          <p>아직 회원이 아니신가요?</p>
          <p><a href="#signup.html">회원가입하기</a></p>
         </div>

         <div class="divider">
          <hr>
          <span>or</span>
          <hr>
         </div>

         <div class="social-login">
          <ul>
            <li>
              <a href="#">
                <img src="" alt="카카오로 로그인하기">
              </a>
            </li>
            <li>
              <a href="#">
                <img src="" alt="네이버로 로그인하기">
              </a>
            </li>
            <li>
              <a href="#">
                <img src="" alt="구글로 로그인하기">
              </a>
            </li>
            <li>
              <a href="#">
                <img src="" alt="애플로 로그인하기">
              </a>
            </li>
          </ul>
         </div>

         <div class="find-account">
          <ul>
            <li>
              <a href="#">아이디 찾기</a>
            </li>
            <li>
              <a href="#">비밀번호 찾기</a>
            </li>
         </div>

      </section>
    </main>
  </body>
</html>
